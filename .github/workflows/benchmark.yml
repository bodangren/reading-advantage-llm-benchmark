name: Benchmark

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      model:
        description: 'Model to run (default: all)'
        required: false
        default: 'all'
      prompt_version:
        description: 'Prompt version tag'
        required: false
        default: 'latest'

env:
  PIPELINE_COMMAND: npm run pipeline
  ARTIFACT_NAME: benchmark-results

jobs:
  validate:
    name: Validate Workflow
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate workflow syntax
        run: |
          if command -v actionlint &> /dev/null; then
            actionlint
          else
            echo "actionlint not installed, skipping validation"
          fi

  benchmark:
    name: Benchmark ${{ matrix.model }}
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        model:
          - gpt-4.5
          - gpt-4o
          - claude-3-5-sonnet
          - gemini-2-flash
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run benchmark
        run: |
          echo "Running benchmark for model: ${{ matrix.model }}"
          npm run pipeline -- --model=${{ matrix.model }} --prompt=${{ github.event.inputs.prompt_version || 'latest' }}
        env:
          MODEL: ${{ matrix.model }}
          PROMPT_VERSION: ${{ github.event.inputs.prompt_version || 'latest' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ env.ARTIFACT_NAME }}-${{ matrix.model }}-${{ github.sha }}
          path: runs/*.json
          retention-days: 30

  aggregate:
    name: Aggregate Results
    needs: benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge results
        run: |
          mkdir -p runs
          for dir in artifacts/*/; do
            cp "$dir"/*.json runs/ 2>/dev/null || true
          done
          echo "Merged artifacts into runs/"

      - name: Upload merged results
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}-merged-${{ github.sha }}
          path: runs/
          retention-days: 30